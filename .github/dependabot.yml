version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      dev-tooling:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'tsx'
      test-tooling:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'supertest'
          - '@types/supertest'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /apps/mock-moveplanner
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
    labels:
      - dependencies
      - docker
