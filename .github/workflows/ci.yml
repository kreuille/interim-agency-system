name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint + format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  test-coverage:
    name: Coverage (enforce thresholds)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run coverage with thresholds enforced
        run: pnpm test:coverage
      - name: Upload coverage HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: '**/coverage/**'
          if-no-files-found: ignore
          retention-days: 7

  build-api:
    name: Build API Docker image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f ./apps/api/Dockerfile -t interim-api:ci .
      - name: Smoke run API container
        run: |
          set -e
          docker run --rm -d --name interim-api-ci \
            -p 3000:3000 \
            -e NODE_ENV=production \
            interim-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              echo "API healthy"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          curl -fsS http://localhost:3000/health
      - name: Inspect API logs on failure
        if: failure()
        run: docker logs interim-api-ci || true
      - name: Stop API
        if: always()
        run: docker stop interim-api-ci || true

  test-integration:
    name: Integration tests (Testcontainers Postgres)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests with Testcontainers
        run: pnpm --filter @interim/api test:integration

  smoke-compose:
    name: docker compose smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build mock-moveplanner image
        run: docker compose build mock-moveplanner
      - name: Start services
        run: docker compose up -d
      - name: Wait for healthchecks
        run: |
          set -e
          for i in $(seq 1 30); do
            unhealthy=$(docker compose ps --format json | \
              jq -r 'select(.Health != "" and .Health != "healthy") | .Name' || true)
            if [ -z "$unhealthy" ]; then
              echo "All services healthy"
              exit 0
            fi
            echo "Waiting on: $unhealthy"
            sleep 2
          done
          docker compose ps
          exit 1
      - name: Smoke test
        run: bash ./scripts/smoke-test.sh
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Shutdown
        if: always()
        run: docker compose down -v

  audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high || true
