name: Trivy security scan

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  scan-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  scan-docker:
    name: Trivy mock-moveplanner image scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build mock-moveplanner image
        run: docker compose build mock-moveplanner
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'interim-mock-moveplanner:latest'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
