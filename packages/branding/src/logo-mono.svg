<?xml version="1.0" encoding="UTF-8"?>
<!-- Helvètia Intérim — logo monochrome (pour fonds colorés, impression N&B).
     Utilise currentColor pour hériter de la couleur du contexte CSS. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Helvètia Intérim" fill="currentColor">
  <!-- Icône : carré outline + croix en négatif -->
  <rect x="1" y="1" width="62" height="62" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2"/>
  <path d="M12 27 h40 v10 h-40 z M27 12 h10 v40 h-10 z" fill="currentColor"/>
  <!-- Wordmark -->
  <g font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
    <text x="82" y="34" font-size="22" font-weight="600" letter-spacing="-0.5" fill="currentColor">Helvètia</text>
    <text x="82" y="54" font-size="13" font-weight="500" letter-spacing="0.12em" text-transform="uppercase" fill="currentColor" opacity="0.6">INTÉRIM</text>
  </g>
</svg>
