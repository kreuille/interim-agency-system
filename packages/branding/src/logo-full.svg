<?xml version="1.0" encoding="UTF-8"?>
<!-- Helvètia Intérim — logo full color (icône + nom inline, fond transparent) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Helvètia Intérim">
  <!-- Icône croix CH -->
  <rect x="0" y="0" width="64" height="64" rx="8" ry="8" fill="#c8102e"/>
  <rect x="12" y="27" width="40" height="10" rx="1" fill="#ffffff"/>
  <rect x="27" y="12" width="10" height="40" rx="1" fill="#ffffff"/>
  <!-- Wordmark -->
  <g font-family="Inter, -apple-system, 'Segoe UI', sans-serif" fill="#1a1a1a">
    <text x="82" y="34" font-size="22" font-weight="600" letter-spacing="-0.5">Helvètia</text>
    <text x="82" y="54" font-size="13" font-weight="500" fill="#6b6864" letter-spacing="0.12em" text-transform="uppercase">INTÉRIM</text>
  </g>
</svg>
