# Grafana dashboards — provisioning automatique depuis le filesystem.
# Charge tous les fichiers JSON sous /etc/grafana/dashboards/.

apiVersion: 1

providers:
  - name: 'Helvètia Intérim — provisioned'
    orgId: 1
    folder: 'Helvètia Intérim'
    folderUid: helvetia-interim
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
