services:
  postgres:
    image: postgres:16-alpine
    container_name: interim-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: interim_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d interim_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: interim-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: interim-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

  mock-moveplanner:
    build:
      context: ./apps/mock-moveplanner
      dockerfile: Dockerfile
    container_name: interim-mock-mp
    ports:
      - '3030:3030'
    environment:
      MOCK_HMAC_SECRET: dev-mock-secret
      PORT: '3030'
      API_WEBHOOK_URL: http://host.docker.internal:3000/webhooks/moveplanner
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3030/health']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: interim-api
    profiles: ['e2e']
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://dev:dev@postgres:5432/interim_dev?schema=public
      REDIS_URL: redis://redis:6379
      BULLMQ_REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_PROVIDER: memory
      CLAMAV_HOST: clamav
      CLAMAV_PORT: '3310'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  clamav:
    image: clamav/clamav:1.4
    container_name: interim-clamav
    ports:
      - '3310:3310'
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ['CMD', 'clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres_data:
  redis_data:
  clamav_db:
